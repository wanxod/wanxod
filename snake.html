<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Snake Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(34, 197, 94, 0.2);
            border-radius: 1rem;
            overflow: hidden;
        }
        canvas {
            display: block;
            background-color: #0f172a;
        }
        .control-btn {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Header Stats -->
    <div class="w-full max-w-md flex justify-between items-end mb-4 px-2">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-green-500">SNAKE</h1>
            <p class="text-xs text-slate-500 uppercase tracking-widest font-bold">Retro Arcade</p>
        </div>
        <div class="flex gap-4">
            <div class="text-right">
                <p class="text-[10px] text-slate-500 font-bold uppercase">Score</p>
                <p id="score" class="text-2xl font-mono leading-none">000</p>
            </div>
            <div class="text-right border-l border-slate-800 pl-4">
                <p class="text-[10px] text-slate-500 font-bold uppercase">Best</p>
                <p id="best-score" class="text-2xl font-mono leading-none text-green-400">000</p>
            </div>
        </div>
    </div>

    <!-- Game Board -->
    <div id="game-container">
        <canvas id="snakeCanvas"></canvas>
        
        <!-- Overlay -->
        <div id="overlay" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-sm transition-opacity duration-300">
            <div id="game-over-ui" class="hidden text-center mb-6">
                <h2 class="text-4xl font-black text-red-500 mb-2">CRASHED!</h2>
                <p id="final-score-msg" class="text-slate-400">Your score was 0</p>
            </div>
            <div id="start-ui" class="text-center mb-6">
                <div class="w-16 h-16 bg-green-500 rounded-2xl mx-auto mb-4 flex items-center justify-center animate-bounce">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M5 3l14 9-14 9V3z"/></svg>
                </div>
                <h2 class="text-xl font-bold">READY TO EAT?</h2>
            </div>
            <button id="start-btn" class="group relative px-8 py-3 bg-green-500 hover:bg-green-400 text-black font-black rounded-full transition-all transform active:scale-95 overflow-hidden">
                <span class="relative z-10">START MISSION</span>
                <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform"></div>
            </button>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div class="mt-8 grid grid-cols-3 gap-3 w-full max-w-[280px]">
        <div></div>
        <button id="up" class="control-btn h-16 bg-slate-800 rounded-2xl flex items-center justify-center active:bg-green-600 active:scale-95 transition-all border-b-4 border-slate-900">
            <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M7 14l5-5 5 5H7z"/></svg>
        </button>
        <div></div>
        
        <button id="left" class="control-btn h-16 bg-slate-800 rounded-2xl flex items-center justify-center active:bg-green-600 active:scale-95 transition-all border-b-4 border-slate-900">
            <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M14 7l-5 5 5 5V7z"/></svg>
        </button>
        <button id="down" class="control-btn h-16 bg-slate-800 rounded-2xl flex items-center justify-center active:bg-green-600 active:scale-95 transition-all border-b-4 border-slate-900">
            <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5H7z"/></svg>
        </button>
        <button id="right" class="control-btn h-16 bg-slate-800 rounded-2xl flex items-center justify-center active:bg-green-600 active:scale-95 transition-all border-b-4 border-slate-900">
            <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M10 17l5-5-5-5v10z"/></svg>
        </button>
    </div>

    <p class="mt-6 text-slate-600 text-[10px] font-bold uppercase tracking-widest">Use Arrow Keys or Buttons</p>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const startUi = document.getElementById('start-ui');
        const gameOverUi = document.getElementById('game-over-ui');
        const finalScoreMsg = document.getElementById('final-score-msg');

        // Game Configuration
        const gridSize = 20;
        let tileCount;
        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let score = 0;
        let bestScore = localStorage.getItem('snakeBestScore') || 0;
        let gameSpeed = 100;
        let gameLoop;
        let isPaused = true;

        bestScoreEl.innerText = bestScore.toString().padStart(3, '0');

        function init() {
            // Adaptive canvas size
            const size = Math.min(window.innerWidth - 40, 400);
            canvas.width = size;
            canvas.height = size;
            tileCount = canvas.width / gridSize;
            
            resetGame();
        }

        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            nextDx = 0;
            nextDy = -1;
            score = 0;
            updateScoreDisplay();
            placeFood();
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Don't place food on snake body
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    placeFood();
                }
            }
        }

        function draw() {
            // Clear Background
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Grid (Subtle)
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 0.5;
            for(let i=0; i<=tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i*gridSize); ctx.lineTo(canvas.width, i*gridSize); ctx.stroke();
            }

            // Draw Food (Glow effect)
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ef4444';
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw Snake
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? '#4ade80' : '#166534';
                
                // Rounded blocks for snake
                const r = isHead ? 6 : 4;
                const x = part.x * gridSize + 1;
                const y = part.y * gridSize + 1;
                const s = gridSize - 2;
                
                ctx.beginPath();
                ctx.roundRect(x, y, s, s, r);
                ctx.fill();

                if (isHead) {
                    // Eyes
                    ctx.fillStyle = 'black';
                    const eyeSize = 2;
                    if (dx === 1 || (dx === 0 && dy === 0)) { // Right
                        ctx.fillRect(x + s - 6, y + 4, eyeSize, eyeSize);
                        ctx.fillRect(x + s - 6, y + s - 6, eyeSize, eyeSize);
                    } else if (dx === -1) { // Left
                        ctx.fillRect(x + 4, y + 4, eyeSize, eyeSize);
                        ctx.fillRect(x + 4, y + s - 6, eyeSize, eyeSize);
                    } else if (dy === -1) { // Up
                        ctx.fillRect(x + 4, y + 4, eyeSize, eyeSize);
                        ctx.fillRect(x + s - 6, y + 4, eyeSize, eyeSize);
                    } else if (dy === 1) { // Down
                        ctx.fillRect(x + 4, y + s - 6, eyeSize, eyeSize);
                        ctx.fillRect(x + s - 6, y + s - 6, eyeSize, eyeSize);
                    }
                }
            });
        }

        function moveSnake() {
            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall Collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return endGame();
            }

            // Self Collision
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    return endGame();
                }
            }

            snake.unshift(head);

            // Food Check
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('snakeBestScore', bestScore);
                }
                updateScoreDisplay();
                placeFood();
                // Speed up slightly
                if (gameSpeed > 50) {
                    clearInterval(gameLoop);
                    gameSpeed -= 1;
                    gameLoop = setInterval(gameStep, gameSpeed);
                }
            } else {
                snake.pop();
            }
        }

        function updateScoreDisplay() {
            scoreEl.innerText = score.toString().padStart(3, '0');
            bestScoreEl.innerText = bestScore.toString().padStart(3, '0');
        }

        function gameStep() {
            if (isPaused) return;
            moveSnake();
            draw();
        }

        function endGame() {
            isPaused = true;
            clearInterval(gameLoop);
            
            finalScoreMsg.innerText = `Your mission ended with ${score} points.`;
            startUi.classList.add('hidden');
            gameOverUi.classList.remove('hidden');
            overlay.classList.remove('opacity-0', 'pointer-events-none');
        }

        function startGame() {
            resetGame();
            isPaused = false;
            overlay.classList.add('opacity-0', 'pointer-events-none');
            
            clearInterval(gameLoop);
            gameSpeed = 100;
            gameLoop = setInterval(gameStep, gameSpeed);
        }

        // Input Handling
        function setDirection(newDx, newDy) {
            // Prevent 180 degree turns
            if (newDx === -dx && newDx !== 0) return;
            if (newDy === -dy && newDy !== 0) return;
            nextDx = newDx;
            nextDy = newDy;
        }

        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp': setDirection(0, -1); break;
                case 'ArrowDown': setDirection(0, 1); break;
                case 'ArrowLeft': setDirection(-1, 0); break;
                case 'ArrowRight': setDirection(1, 0); break;
            }
        });

        // Button Controls
        document.getElementById('up').onclick = () => setDirection(0, -1);
        document.getElementById('down').onclick = () => setDirection(0, 1);
        document.getElementById('left').onclick = () => setDirection(-1, 0);
        document.getElementById('right').onclick = () => setDirection(1, 0);
        startBtn.onclick = () => startGame();

        // Init Game
        window.addEventListener('resize', init);
        init();
        draw();

    </script>
</body>
</html>
